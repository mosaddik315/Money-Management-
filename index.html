<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArthaFlow — গরম কড়াই Business Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--p:#1a56db;--p2:#3b82f6;--p3:#dbeafe;--a:#f97316;--a2:#fed7aa;--g:#10b981;--r:#ef4444;--y:#f59e0b;--bg:#f0f4ff;--bg2:#e8eeff;--card:#ffffff;--text:#0f172a;--t2:#475569;--t3:#94a3b8;--bd:#e2e8f0;--sh:0 2px 16px rgba(26,86,219,.08);--sh2:0 8px 32px rgba(26,86,219,.14);--r8:8px;--r12:12px;--r16:16px;--r20:20px;--sb:#0f2860;--sbt:rgba(255,255,255,.9);--sbt2:rgba(255,255,255,.5);--sbh:rgba(255,255,255,.1);--sba:rgba(255,255,255,.15);}
.theme-dawn{--bg:#fffbf5;--bg2:#fef3e2;--p:#b45309;--p2:#d97706;--p3:#fde68a;}
.theme-morning{--bg:#f0f9ff;--bg2:#e0f2fe;--p:#0369a1;--p2:#0284c7;--p3:#bae6fd;}
.theme-evening{--bg:#fff7ed;--bg2:#ffedd5;--p:#c2410c;--p2:#ea580c;--p3:#fed7aa;}
.theme-night{--bg:#0a0f1e;--bg2:#0f172a;--card:#1e293b;--text:#e2e8f0;--t2:#94a3b8;--t3:#475569;--bd:#334155;--sh:0 2px 16px rgba(0,0,0,.4);--sh2:0 8px 32px rgba(0,0,0,.5);--sb:#060b18;}
*{margin:0;padding:0;box-sizing:border-box;}html{font-size:15px;}
body{font-family:'Hind Siliguri',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .4s,color .4s;overflow-x:hidden;}
#lockScreen{position:fixed;inset:0;background:linear-gradient(135deg,#0f2860 0%,#1a56db 55%,#3b82f6 100%);display:flex;align-items:center;justify-content:center;z-index:1000;}
.lc{background:rgba(255,255,255,.08);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.15);border-radius:24px;padding:40px 32px;width:320px;text-align:center;color:#fff;}
.lc-mark{width:68px;height:68px;background:linear-gradient(135deg,#f97316,#fbbf24);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;margin:0 auto 14px;font-family:'Outfit',sans-serif;box-shadow:0 8px 24px rgba(249,115,22,.4);}
.lc-title{font-size:1.7rem;font-weight:800;font-family:'Outfit',sans-serif;letter-spacing:-.5px;}
.lc-sub{font-size:.82rem;opacity:.6;margin-top:3px;}
.pin-dots{display:flex;justify-content:center;gap:12px;margin:24px 0 18px;}
.pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid rgba(255,255,255,.4);transition:all .2s;}
.pin-dot.filled{background:#fff;border-color:#fff;transform:scale(1.1);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px;}
.pb{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:1.25rem;font-weight:600;padding:13px;border-radius:11px;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif;}
.pb:hover{background:rgba(255,255,255,.2);transform:scale(1.03);}
.pb:active{transform:scale(.96);}
.pb.del{color:#fca5a5;}
.pin-hint{font-size:.8rem;opacity:.55;min-height:18px;}
.pin-err{color:#fca5a5!important;opacity:1!important;}
.pin-ok{color:#6ee7b7!important;opacity:1!important;}
#mainApp{display:flex;min-height:100vh;}
.sidebar{width:255px;min-height:100vh;background:var(--sb);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;transition:transform .3s ease;}
.sb-head{padding:18px 14px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;}
.sb-logo{display:flex;align-items:center;gap:9px;}
.sb-mark{width:38px;height:38px;background:linear-gradient(135deg,#f97316,#fbbf24);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;font-family:'Outfit',sans-serif;color:#fff;flex-shrink:0;}
.sb-title{font-size:1.05rem;font-weight:700;color:#fff;font-family:'Outfit',sans-serif;}
.sb-sub{font-size:.7rem;color:var(--sbt2);margin-top:1px;}
.sb-x{background:none;border:none;color:var(--sbt2);cursor:pointer;font-size:1rem;padding:4px;display:none;}
.sb-nav{flex:1;overflow-y:auto;padding:10px 0;}
.nav-g{margin-bottom:2px;}
.nav-gl{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--sbt2);padding:9px 18px 3px;}
.ni{display:flex;align-items:center;gap:7px;padding:8px 18px;color:var(--sbt2);cursor:pointer;border-radius:7px;margin:1px 7px;transition:all .15s;font-size:.86rem;user-select:none;}
.ni:hover{background:var(--sbh);color:#fff;}
.ni.active{background:var(--sba);color:#fff;font-weight:600;}
.ni .ico{font-size:.95rem;width:18px;text-align:center;}
.sb-foot{padding:14px;border-top:1px solid rgba(255,255,255,.06);text-align:center;}
.sb-clock{font-size:1.45rem;font-weight:700;color:#fff;font-family:'Outfit',sans-serif;}
.sb-date{font-size:.72rem;color:var(--sbt2);margin-top:2px;}
.main-wrap{flex:1;margin-left:255px;display:flex;flex-direction:column;min-height:100vh;transition:margin .3s;}
.topbar{height:58px;background:var(--card);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;padding:0 18px;position:sticky;top:0;z-index:50;box-shadow:var(--sh);}
.tb-menu{background:none;border:none;cursor:pointer;color:var(--t2);font-size:1.25rem;padding:4px;display:none;}
.tb-title{flex:1;font-size:1rem;font-weight:700;}
.tb-lock{background:var(--bg2);border:none;border-radius:var(--r8);padding:6px 12px;cursor:pointer;font-size:.8rem;color:var(--t2);transition:all .15s;font-family:'Hind Siliguri',sans-serif;}
.tb-lock:hover{background:var(--p3);color:var(--p);}
.content{flex:1;padding:18px;max-width:1080px;}
.section{display:none;}.section.active{display:block;animation:fadeIn .22s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--card);border-radius:var(--r16);padding:18px;box-shadow:var(--sh);border:1px solid var(--bd);}
.ct{font-size:.8rem;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.sg3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:18px;}
.sc{background:var(--card);border-radius:var(--r16);padding:16px;box-shadow:var(--sh);border:1px solid var(--bd);position:relative;overflow:hidden;}
.sc::after{content:'';position:absolute;top:-20px;right:-20px;width:75px;height:75px;border-radius:50%;opacity:.07;}
.sc.bl::after{background:var(--p)}.sc.gr::after{background:var(--g)}.sc.or::after{background:var(--a)}.sc.re::after{background:var(--r)}
.sl{font-size:.73rem;color:var(--t2);font-weight:500;margin-bottom:5px;}
.sv{font-size:1.4rem;font-weight:700;font-family:'Outfit',sans-serif;}
.sv.bl{color:var(--p)}.sv.gr{color:var(--g)}.sv.or{color:var(--a)}.sv.re{color:var(--r)}
.ss{font-size:.7rem;color:var(--t3);margin-top:3px;}
.fr{margin-bottom:12px;}.fl{font-size:.8rem;font-weight:500;color:var(--t2);margin-bottom:4px;display:block;}
.fi,.fs,.fta{width:100%;padding:9px 11px;border:1.5px solid var(--bd);border-radius:var(--r8);background:var(--card);color:var(--text);font-size:.88rem;font-family:'Hind Siliguri',sans-serif;transition:border .15s;outline:none;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--p2);}.fta{resize:vertical;min-height:70px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.btn{padding:8px 16px;border-radius:var(--r8);border:none;cursor:pointer;font-size:.85rem;font-weight:600;font-family:'Hind Siliguri',sans-serif;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.bp{background:var(--p);color:#fff;}.bp:hover{background:var(--p2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(26,86,219,.3);}
.bs{background:var(--bg2);color:var(--t2);}.bs:hover{background:var(--p3);color:var(--p);}
.bd2{background:#fee2e2;color:var(--r);}.bd2:hover{background:var(--r);color:#fff;}
.bg2c{background:#d1fae5;color:var(--g);}.bg2c:hover{background:var(--g);color:#fff;}
.bo{background:#ffedd5;color:var(--a);}.bo:hover{background:var(--a);color:#fff;}
.btn-sm{padding:4px 9px;font-size:.76rem;}.btn-bl{width:100%;justify-content:center;}
.mb8{margin-bottom:8px;}.mb12{margin-bottom:12px;}.mb16{margin-bottom:16px;}.mb20{margin-bottom:20px;}
.mt8{margin-top:8px;}.mt12{margin-top:12px;}.mt16{margin-top:16px;}
.tw{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{font-size:.72rem;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;padding:9px 11px;text-align:left;border-bottom:2px solid var(--bd);background:var(--bg);}
td{padding:9px 11px;border-bottom:1px solid var(--bd);font-size:.86rem;}
tr:last-child td{border-bottom:none;}tr:hover td{background:var(--bg);}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:600;}
.bg-g{background:#d1fae5;color:#065f46;}.bg-r{background:#fee2e2;color:#991b1b;}
.bg-b{background:#dbeafe;color:#1e40af;}.bg-o{background:#ffedd5;color:#9a3412;}.bg-y{background:#fef3c7;color:#92400e;}
.pw{background:var(--bg2);border-radius:999px;height:7px;overflow:hidden;}
.pb2{height:100%;border-radius:999px;transition:width .5s;}
.pb2.b{background:var(--p)}.pb2.g{background:var(--g)}.pb2.o{background:var(--a)}.pb2.r{background:var(--r)}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal-ov.open{display:flex;}
.modal-box{background:var(--card);border-radius:var(--r20);width:100%;max-width:500px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh2);}
.mh{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--bd);}
.mt2{font-size:.95rem;font-weight:700;}
.mx{background:var(--bg2);border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;font-size:.82rem;color:var(--t2);transition:all .15s;}
.mx:hover{background:var(--r);color:#fff;}
.mb2{padding:18px;}.mf{padding:14px 18px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:9px;}
.sh-t{font-size:1.05rem;font-weight:700;}.sh-s{font-size:.78rem;color:var(--t2);margin-top:1px;}
.wg{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px;}
.wc{border-radius:var(--r16);padding:18px;color:#fff;position:relative;overflow:hidden;cursor:pointer;transition:transform .2s;}
.wc:hover{transform:translateY(-2px);}
.wc::before{content:'';position:absolute;top:-28px;right:-28px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.1);}
.wc.blue{background:linear-gradient(135deg,#1d4ed8,#3b82f6);}
.wc.green{background:linear-gradient(135deg,#047857,#10b981);}
.wc.purple{background:linear-gradient(135deg,#6d28d9,#8b5cf6);}
.wc.orange{background:linear-gradient(135deg,#c2410c,#f97316);}
.wn{font-size:.78rem;opacity:.8;margin-bottom:7px;}.wb{font-size:1.45rem;font-weight:700;font-family:'Outfit',sans-serif;}
.wi{font-size:1.4rem;position:absolute;bottom:12px;right:12px;opacity:.25;}
.rc{background:var(--card);border-radius:var(--r16);border:1px solid var(--bd);overflow:hidden;box-shadow:var(--sh);transition:transform .2s;}
.rc:hover{transform:translateY(-2px);box-shadow:var(--sh2);}
.rc-h{background:linear-gradient(135deg,#c2410c,#f97316);padding:14px;color:#fff;}
.rc-n{font-size:.98rem;font-weight:700;}.rc-p{font-size:.78rem;opacity:.85;margin-top:2px;}
.rc-b{padding:14px;}.rc-stats{display:flex;gap:10px;margin-bottom:10px;}
.rc-si{flex:1;text-align:center;}.rc-sv{font-size:.92rem;font-weight:700;font-family:'Outfit',sans-serif;}
.rc-sl{font-size:.68rem;color:var(--t3);}
.ing-tag{display:inline-block;padding:2px 7px;background:var(--bg2);border-radius:20px;margin:2px;font-size:.7rem;}
.sr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bd);}
.sr:last-child{border-bottom:none;}
.gk-strip{height:3px;background:linear-gradient(90deg,#c2410c,#f97316,#fbbf24);border-radius:2px;margin-bottom:18px;}
.gk-badge{display:inline-flex;align-items:center;gap:4px;background:#ffedd5;color:#c2410c;padding:3px 9px;border-radius:20px;font-size:.72rem;font-weight:700;}
.empty{text-align:center;padding:40px 20px;color:var(--t3);}
.empty-i{font-size:2.2rem;margin-bottom:10px;}.empty-t{font-size:.88rem;}
hr{border:none;border-top:1px solid var(--bd);margin:14px 0;}
#toast{position:fixed;bottom:22px;right:22px;background:var(--text);color:var(--card);border-radius:var(--r12);padding:11px 18px;font-size:.83rem;font-weight:500;transform:translateY(80px);opacity:0;transition:all .3s;z-index:999;max-width:280px;}
#toast.show{transform:translateY(0);opacity:1;}#toast.ok{background:var(--g);}#toast.err{background:var(--r);}
.num{font-family:'Outfit',sans-serif;font-weight:600;}
.tg{color:var(--g);}.tr{color:var(--r);}.tb{color:var(--p);}.to{color:var(--a);}.t3c{color:var(--t3);}
.ing-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:6px;align-items:center;margin-bottom:7px;}
.stock-low{color:var(--r);font-weight:600;}
.stock-ok{color:var(--g);}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}.sidebar.mob{transform:translateX(0);box-shadow:0 0 0 100vw rgba(0,0,0,.5);}
  .main-wrap{margin-left:0!important;}.tb-menu{display:block;}.sb-x{display:block;}
  .stat-grid{grid-template-columns:1fr 1fr;}.sg2,.sg3{grid-template-columns:1fr;}
  .fr2,.fr3{grid-template-columns:1fr;}.content{padding:12px;}
  .ing-row{grid-template-columns:1fr 1fr;gap:5px;}
}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px;}
</style>
</head>
<body>
<div id="lockScreen">
  <div class="lc">
    <div class="lc-mark">A</div>
    <div class="lc-title">ArthaFlow</div>
    <div class="lc-sub">গরম কড়াই Business Suite</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-pad">
      <button class="pb" onclick="PI('1')">১</button><button class="pb" onclick="PI('2')">২</button><button class="pb" onclick="PI('3')">৩</button>
      <button class="pb" onclick="PI('4')">৪</button><button class="pb" onclick="PI('5')">৫</button><button class="pb" onclick="PI('6')">৬</button>
      <button class="pb" onclick="PI('7')">৭</button><button class="pb" onclick="PI('8')">৮</button><button class="pb" onclick="PI('9')">৯</button>
      <button class="pb del" onclick="PC()">⌫</button><button class="pb" onclick="PI('0')">০</button><button class="pb" onclick="PS()">✓</button>
    </div>
    <p class="pin-hint" id="pH">৪ সংখ্যার পিন দিন (ডিফল্ট: 1234)</p>
  </div>
</div>
<div id="mainApp" style="display:none">
  <aside class="sidebar" id="SB">
    <div class="sb-head">
      <div class="sb-logo">
        <div class="sb-mark">A</div>
        <div><div class="sb-title">ArthaFlow</div><div class="sb-sub" id="thLbl">দুপুর</div></div>
      </div>
      <button class="sb-x" onclick="togSB()">✕</button>
    </div>
    <nav class="sb-nav">
      <div class="nav-g">
        <div class="nav-gl">ব্যক্তিগত</div>
        <div class="ni active" data-s="dashboard" onclick="nav('dashboard')"><span class="ico">🏠</span> ড্যাশবোর্ড</div>
        <div class="ni" data-s="transactions" onclick="nav('transactions')"><span class="ico">💰</span> লেনদেন</div>
        <div class="ni" data-s="wallet" onclick="nav('wallet')"><span class="ico">👛</span> ওয়ালেট</div>
        <div class="ni" data-s="budget" onclick="nav('budget')"><span class="ico">📊</span> বাজেট</div>
        <div class="ni" data-s="savings" onclick="nav('savings')"><span class="ico">🎯</span> সঞ্চয় লক্ষ্য</div>
      </div>
      <div class="nav-g">
        <div class="nav-gl">🍳 গরম কড়াই</div>
        <div class="ni" data-s="gk-recipes" onclick="nav('gk-recipes')"><span class="ico">📋</span> রেসিপি ও মেনু</div>
        <div class="ni" data-s="gk-purchase" onclick="nav('gk-purchase')"><span class="ico">🛒</span> কাঁচামাল ক্রয়</div>
        <div class="ni" data-s="gk-sales" onclick="nav('gk-sales')"><span class="ico">📦</span> বিক্রয়</div>
        <div class="ni" data-s="gk-stock" onclick="nav('gk-stock')"><span class="ico">🗃️</span> স্টক</div>
        <div class="ni" data-s="gk-report" onclick="nav('gk-report')"><span class="ico">📈</span> P&L রিপোর্ট</div>
      </div>
      <div class="nav-g">
        <div class="ni" data-s="settings" onclick="nav('settings')"><span class="ico">⚙️</span> সেটিংস</div>
      </div>
    </nav>
    <div class="sb-foot">
      <div class="sb-clock" id="sCk">--:--</div>
      <div class="sb-date" id="sDt">--</div>
    </div>
  </aside>
  <div class="main-wrap" id="MW">
    <header class="topbar">
      <button class="tb-menu" onclick="togSB()">☰</button>
      <div class="tb-title" id="pgT">ড্যাশবোর্ড</div>
      <button class="tb-lock" onclick="lockApp()">🔒 লক</button>
    </header>
    <div class="content">
      <div id="sec-dashboard" class="section active"><div id="C_dashboard"></div></div>
      <div id="sec-transactions" class="section"><div id="C_transactions"></div></div>
      <div id="sec-wallet" class="section"><div id="C_wallet"></div></div>
      <div id="sec-budget" class="section"><div id="C_budget"></div></div>
      <div id="sec-savings" class="section"><div id="C_savings"></div></div>
      <div id="sec-gk-recipes" class="section"><div id="C_gk-recipes"></div></div>
      <div id="sec-gk-purchase" class="section"><div id="C_gk-purchase"></div></div>
      <div id="sec-gk-sales" class="section"><div id="C_gk-sales"></div></div>
      <div id="sec-gk-stock" class="section"><div id="C_gk-stock"></div></div>
      <div id="sec-gk-report" class="section"><div id="C_gk-report"></div></div>
      <div id="sec-settings" class="section"><div id="C_settings"></div></div>
    </div>
  </div>
</div>
<div class="modal-ov" id="MOD">
  <div class="modal-box">
    <div class="mh"><span class="mt2" id="MOD_T">--</span><button class="mx" onclick="closeM()">✕</button></div>
    <div class="mb2" id="MOD_B"></div>
  </div>
</div>
<div id="toast"></div>
<script>
// ════ DATA LAYER ════
const DB={
  g:k=>{try{return JSON.parse(localStorage.getItem('af_'+k));}catch{return null;}},
  s:(k,v)=>{try{localStorage.setItem('af_'+k,JSON.stringify(v));}catch{}},
  d:(k,def)=>{const v=DB.g(k);if(v===null||v===undefined){DB.s(k,def);return def;}return v;}
};
const D={
  get pin(){return DB.d('pin','1234');},
  get wallets(){return DB.d('wallets',[
    {id:'cash',name:'নগদ',balance:0,color:'blue',icon:'💵'},

let manualTheme='';
const THEMES=[
  {r:[5,8],cls:'theme-dawn',lbl:'ভোর'},
  {r:[8,12],cls:'theme-morning',lbl:'সকাল'},
  {r:[12,16],cls:'',lbl:'দুপুর'},
  {r:[16,19],cls:'theme-evening',lbl:'সন্ধ্যা'},
  {r:[19,24],cls:'theme-night',lbl:'রাত'},
  {r:[0,5],cls:'theme-night',lbl:'রাত'}
];
function applyTheme(){
  if(manualTheme&&manualTheme!=='auto'){
    document.body.className=manualTheme;
    const l=$id('thLbl');if(l)l.textContent=manualTheme.replace('theme-','');return;
  }
  const h=new Date().getHours();
  const t=THEMES.find(x=>h>=x.r[0]&&h<x.r[1])||THEMES[4];
  document.body.className=t.cls;
  const l=$id('thLbl');if(l)l.textContent=t.lbl;
}
function updClock(){
  const now=new Date(),h=String(now.getHours()).padStart(2,'0'),m=String(now.getMinutes()).padStart(2,'0');
  const ck=$id('sCk'),dt=$id('sDt');
  if(ck)ck.textContent=bn(h)+':'+bn(m);

}

function updTxCats(){const t=val('tT');$id('tC').innerHTML=TXC[t].map(c=>`<option>${c}</option>`).join('');}
function saveTx(){
  const type=val('tT'),amount=flt('tA'),category=val('tC'),walletId=val('tW'),date=val('tD'),note=val('tN');
  if(!amount||amount<=0){toast('সঠিক পরিমাণ দিন','err');return;}
  const tx={id:uid(),type,amount,category,walletId,date,note};
  const txs=D.transactions;txs.push(tx);SV.transactions(txs);
  const ws=D.wallets,w=ws.find(x=>x.id===walletId);
  if(w){w.balance+=(type==='income'?amount:-amount);SV.wallets(ws);}
  if(type==='expense'){const bs=D.budgets,b=bs.find(x=>x.name===category);if(b){b.spent=(b.spent||0)+amount;SV.budgets(bs);}}
  closeM();toast('লেনদেন সংরক্ষিত ✓','ok');renderSec(curSec);
}
function delTx(id){
  if(!confirm('মুছবেন?'))return;
  const txs=D.transactions,tx=txs.find(t=>t.id===id);if(!tx)return;
  const ws=D.wallets,w=ws.find(x=>x.id===tx.walletId);
  if(w){w.balance+=(tx.type==='income'?-tx.amount:tx.amount);SV.wallets(ws);}
  SV.transactions(txs.filter(t=>t.id!==id));toast('মুছে দেওয়া হয়েছে');renderSec(curSec);
}

function rAddM(eid){
  const ed=eid?D.gkR.find(r=>r.id===eid):null;

    <button class="btn bs btn-sm mt8" onclick="addIng()">+ উপকরণ যোগ</button>

    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">

      <button class="btn bp" onclick="saveRecipe('${eid||''}')">সংরক্ষণ</button>
    </div>`);
}
function prevCost(){
  let cost=0;
  for(let i=0;i<50;i++){
    const ni=$id('in_'+i),qi=$id('iq_'+i),ci=$id('ic_'+i);
    if(!ni)continue;
    const q=parseFloat(qi?qi.value:0)||0,c=parseFloat(ci?ci.value:0)||0;
    cost+=q*c;
  }
  const sp=flt('rSP'),profit=sp-cost,margin=sp>0?(profit/sp*100):0;
  $id('rCostPrev').innerHTML=`উৎপাদন খরচ: <span class="num tr">${fmt(cost)}</span> | লাভ: <span class="num ${profit>=0?'tg':'tr'}">${fmt(profit)}</span> | মার্জিন: <span class="num tb">${bn(Math.round(margin))}%</span>`;
}
function saveRecipe(eid){
  const name=val('rN').trim(),sellPrice=flt('rSP'),category=val('rCat');
  if(!name){toast('নাম দিন','err');return;}
  const ingredients=[];
  for(let i=0;i<50;i++){
    const ni=$id('in_'+i),qi=$id('iq_'+i),ui=$id('iu_'+i),ci=$id('ic_'+i);
    if(!ni)continue;
    const n=ni.value.trim();if(!n)continue;
    ingredients.push({name:n,qty:parseFloat(qi?qi.value:1)||1,unit:ui?ui.value:'পিস',cpu:parseFloat(ci?ci.value:0)||0});
  }
  if(ingredients.length===0){toast('অন্তত ১টি উপকরণ দিন','err');return;}
  const rs=D.gkR;
  if(eid){const r=rs.find(x=>x.id===eid);if(r){r.name=name;r.sellPrice=sellPrice;r.category=category;r.ingredients=ingredients;}}
  else{rs.push({id:uid(),name,sellPrice,category,ingredients});}
  SV.gkR(rs);closeM();toast('রেসিপি সংরক্ষিত ✓','ok');rGKR();
}
function rDel(id){
  if(!confirm('এই রেসিপি মুছবেন?'))return;
  SV.gkR(D.gkR.filter(r=>r.id!==id));toast('মুছে দেওয়া হয়েছে');rGKR();
}

function savePurch(){

// ════ GK REPORT ════
function rGKRep(){
  const ss=D.gkS,rs=D.gkR,ps=D.gkP;
  const nowM=new Date().toISOString().slice(0,7);
  const mSales=ss.filter(s=>s.date.startsWith(nowM));
  const mPurch=ps.filter(p=>p.date.startsWith(nowM));
  const totRev=ss.reduce((s,x)=>s+x.total,0);
  const totCOGS=ss.reduce((s,x)=>{const r=rs.find(rx=>rx.id===x.recipeId);return s+(r?rcost(r)*x.qty:0);},0);
  const totPurch=ps.reduce((s,p)=>s+p.totalCost,0);
  const totProfit=totRev-totCOGS;
  const mRev=mSales.reduce((s,x)=>s+x.total,0);
  const mCOGS=mSales.reduce((s,x)=>{const r=rs.find(rx=>rx.id===x.recipeId);return s+(r?rcost(r)*x.qty:0);},0);
  const mPurchTotal=mPurch.reduce((s,p)=>s+p.totalCost,0);
  const mProfit=mRev-mCOGS;

  // Per recipe stats
  const recStats=rs.map(r=>{
    const rSales=ss.filter(s=>s.recipeId===r.id);
    const qty=rSales.reduce((s,x)=>s+x.qty,0);
    const rev=rSales.reduce((s,x)=>s+x.total,0);
    const cogs=rcost(r)*qty;
    return {name:r.name,qty,rev,cogs,profit:rev-cogs,margin:rev>0?((rev-cogs)/rev*100):0};
  }).sort((a,b)=>b.profit-a.profit);

  $id('C_gk-report').innerHTML=`
    <div class="gk-strip"></div>
    <div class="sh"><div><div class="sh-t">P&L রিপোর্ট <span class="gk-badge">🍳 গরম কড়াই</span></div><div class="sh-s">সর্বকালীন ও মাসিক বিশ্লেষণ</div></div></div>
    <div class="stat-grid mb16">
      <div class="sc gr"><div class="sl">মোট রাজস্ব</div><div class="sv gr num">${fmt(totRev)}</div><div class="ss">এই মাস: ${fmt(mRev)}</div></div>
      <div class="sc re"><div class="sl">মোট উৎপাদন খরচ</div><div class="sv re num">${fmt(totCOGS)}</div><div class="ss">এই মাস: ${fmt(mCOGS)}</div></div>
      <div class="sc or"><div class="sl">মোট কাঁচামাল ক্রয়</div><div class="sv or num">${fmt(totPurch)}</div><div class="ss">এই মাস: ${fmt(mPurchTotal)}</div></div>
      <div class="sc ${totProfit>=0?'gr':'re'}"><div class="sl">নিট লাভ</div><div class="sv ${totProfit>=0?'gr':'re'} num">${fmt(totProfit)}</div><div class="ss">এই মাস: ${fmt(mProfit)}</div></div>
    </div>
    <div class="sg2 mb16">
      <div class="card">
        <div class="ct">এই মাসের P&L সারাংশ</div>
        <div class="sr"><span>মোট বিক্রয়</span><span class="num tg">${fmt(mRev)}</span></div>
        <div class="sr"><span>উৎপাদন খরচ (COGS)</span><span class="num tr">− ${fmt(mCOGS)}</span></div>
        <div class="sr"><span>কাঁচামাল ক্রয়</span><span class="num tr">− ${fmt(mPurchTotal)}</span></div>
        <hr>
        <div class="sr"><span style="font-weight:700">নিট লাভ</span><span class="num ${mProfit>=0?'tg':'tr'}" style="font-weight:700;font-size:1rem">${fmt(mProfit)}</span></div>
        <div style="margin-top:10px"><div style="font-size:.74rem;color:var(--t3);margin-bottom:5px">মার্জিন: ${bn(Math.round(mRev>0?(mProfit/mRev*100):0))}%</div>
        <div class="pw"><div class="pb2 ${mProfit>=0?'g':'r'}" style="width:${Math.min(100,Math.abs(mRev>0?(mProfit/mRev*100):0))}%"></div></div></div>
      </div>
      <div class="card">
        <div class="ct">আইটেম ভিত্তিক লাভ</div>
        ${recStats.map(r=>`
          <div class="sr">
            <div><div style="font-weight:500">${r.name}</div><div style="font-size:.72rem;color:var(--t3)">${bn(r.qty)} পিস | মার্জিন: ${bn(Math.round(r.margin))}%</div></div>
            <div style="text-align:right">
              <div class="num ${r.profit>=0?'tg':'tr'}" style="font-weight:700">${fmt(r.profit)}</div>
              <div style="font-size:.72rem;color:var(--t3)">রাজস্ব: ${fmt(r.rev)}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="ct">বিক্রয় বিস্তারিত (সর্বকালীন)</div>
      <div class="tw"><table><thead><tr><th>আইটেম</th><th>বিক্রিত</th><th>রাজস্ব</th><th>COGS</th><th>লাভ</th><th>মার্জিন</th></tr></thead>
      <tbody>${recStats.map(r=>`<tr><td style="font-weight:500">${r.name}</td><td class="num">${bn(r.qty)}</td><td class="num tg">${fmt(r.rev)}</td><td class="num tr">${fmt(r.cogs)}</td><td class="num ${r.profit>=0?'tg':'tr'}" style="font-weight:700">${fmt(r.profit)}</td><td class="num">${bn(Math.round(r.margin))}%</td></tr>`).join('')}
      </tbody></table></div>
    </div>`;
}

  const cur=val('sCurPin'),nw=val('sNewPin'),cn=val('sCnfPin');
  if(cur!==D.pin){toast('বর্তমান পিন ভুল','err');return;}
  if(nw.length!==4){toast('পিন ৪ সংখ্যার হতে হবে','err');return;}
  if(nw!==cn){toast('নতুন পিন মিলছে না','err');return;}
  SV.pin(nw);toast('পিন পরিবর্তিত হয়েছে ✓','ok');
}
function applyManTheme(){
  const sel=document.querySelector('input[name="thm"]:checked');
  if(sel){manualTheme=sel.value==='auto'?'auto':sel.value;applyTheme();}
}
function exportData(){
  const data={wallets:D.wallets,transactions:D.transactions,budgets:D.budgets,savings:D.savings,gkR:D.gkR,gkP:D.gkP,gkS:D.gkS,gkSt:D.gkSt};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='arthaflow_backup_'+td()+'.json';a.click();
  toast('এক্সপোর্ট সম্পন্ন ✓','ok');
}
function importTrigger(){$id('impFile').click();}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.wallets)SV.wallets(d.wallets);if(d.transactions)SV.transactions(d.transactions);
      if(d.budgets)SV.budgets(d.budgets);if(d.savings)SV.savings(d.savings);
      if(d.gkR)SV.gkR(d.gkR);if(d.gkP)SV.gkP(d.gkP);if(d.gkS)SV.gkS(d.gkS);if(d.gkSt)SV.gkSt(d.gkSt);
      toast('ইম্পোর্ট সফল হয়েছে ✓','ok');renderSec(curSec);
    }catch{toast('ফাইল পড়তে সমস্যা হয়েছে','err');}
  };reader.readAsText(f);
}
function clearAll(){
  if(!confirm('সকল ডেটা মুছে ফেলতে চান? এটি পূর্বাবস্থায় ফেরানো যাবে না!'))return;
  ['wallets','transactions','budgets','savings','gkR','gkP','gkS','gkSt'].forEach(k=>DB.s(k,null));
  toast('সব ডেটা মুছে গেছে','err');renderSec(curSec);
}

// ════ INIT ════
function initApp(){
  applyTheme();updClock();
  setInterval(()=>{updClock();applyTheme();},60000);
  renderSec('dashboard');
}
</script>
